plugins {
    // Apply the application plugin to add support for building a CLI application in Java.
    id 'application'
    id 'org.openjfx.javafxplugin' version '0.0.14'
}

javafx {
    version = "21"
    modules = [ 'javafx.controls' ]
}

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()

    maven {
        url = uri("https://frcmaven.wpi.edu/artifactory/release/")
    }
}

dependencies {
    implementation "edu.wpi.first.wpilibj:wpilibj-java:2025.3.2"
    implementation "edu.wpi.first.wpimath:wpimath-java:2025.3.2"

    implementation 'com.google.code.gson:gson:2.10.1'

    implementation 'com.google.apis:google-api-services-sheets:v4-rev20230815-2.0.0'
    implementation 'com.google.oauth-client:google-oauth-client-jetty:1.34.1'
    implementation 'com.google.http-client:google-http-client-gson:1.43.3'

    implementation 'com.google.api-client:google-api-client:1.34.2'
    implementation 'com.google.http-client:google-http-client:1.43.3'
    // Use JUnit Jupiter for testing.
    testImplementation libs.junit.jupiter

    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

    // This dependency is used by the application.
    implementation libs.guava
}

// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

application {
    // Define the main class for the application.
    mainClass = 'instinct2026.MainGUI'
}

tasks.named('test') {
    // Use JUnit Platform for unit tests.
    useJUnitPlatform()
}

tasks.named('run', JavaExec) {
    mainClass.set('instinct2026.MainGUI')
}
